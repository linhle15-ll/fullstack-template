# docker-compose.yaml

services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile

    container_name: fullstack-template-server

    ports:
      - "5001:5000" #HOST_PORT:CONTAINER_PORT

    environment:
      NODE_ENV: development

    volumes:
      - server_app:/app
      - server_node_modules:/app/node_modules

    command: pnpm dev

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile

    container_name: fullstack-template-client

    ports:
      - "3001:3000"

    environment:
      NODE_ENV: development

    volumes:
      - client_app:/app
      - client_node_modules:/app/node_modules
      - client_next:/app/.next

    command: pnpm dev

    depends_on:
      - server

volumes:
  server_app:
  server_node_modules:
  client_app:
  client_node_modules:
  client_next:
